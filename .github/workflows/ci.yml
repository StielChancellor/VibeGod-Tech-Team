name: CI

# Keeps the vibegod-tech-team plugin green: validates the marketplace/plugin manifests and every
# skill/agent/command frontmatter (zero-dep Node script), cross-checks with the official
# `claude plugin validate` (catches anything the homegrown linter misses, e.g. YAML that a
# real parser rejects), and runs the guardrail hook unit tests.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate manifests, skills, agents, commands
        run: node ingest/validate.mjs

      - name: Cross-check with official Claude plugin validator
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate ./plugins/vibegod-tech-team

      - name: Run guardrail hook unit tests
        run: node ingest/test-hooks.mjs
